spring.application.name=hybrid-api
server.port=${APP_PORT:8080}

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${DB_URL:jdbc:h2:mem:hybriddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

payment.provider=${PAYMENT_PROVIDER:}
payment.base-url=${PAYMENT_BASE_URL:}
payment.public-key=${PAYMENT_PUBLIC_KEY:}
payment.secret-key=${PAYMENT_SECRET_KEY:}
payment.webhook-url=${PAYMENT_WEBHOOK_URL:}

email.provider=${EMAIL_PROVIDER:resend}
email.base-url=${EMAIL_BASE_URL:https://api.resend.com}
email.api-key=${EMAIL_API_KEY:}
email.from-address=${EMAIL_FROM_ADDRESS:onboarding@resend.dev}
email.enabled=${EMAIL_ENABLED:false}

weather.provider=${WEATHER_PROVIDER:open-meteo}
weather.base-url=${WEATHER_BASE_URL:https://api.open-meteo.com}
weather.api-key=${WEATHER_API_KEY:}
weather.enabled=${WEATHER_ENABLED:true}

maps.provider=${MAPS_PROVIDER:openstreetmap}
maps.geocode-base-url=${MAPS_GEOCODE_BASE_URL:https://nominatim.openstreetmap.org}
maps.tiles-base-url=${MAPS_TILES_BASE_URL:https://tile.openstreetmap.org/{z}/{x}/{y}.png}
maps.route-base-url=${MAPS_ROUTE_BASE_URL:https://router.project-osrm.org}
maps.api-key=${MAPS_API_KEY:}
maps.enabled=${MAPS_ENABLED:true}
